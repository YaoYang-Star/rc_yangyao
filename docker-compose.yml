version: '3.8'

services:
  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

  notification-server:
    build: .
    restart: always
    ports:
      - "8080:8080"
    environment:
      - REDIS_ADDR=redis:6379
      - API_KEY=your-secret-api-key # 替换为自己的API Key
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  redis_data:
